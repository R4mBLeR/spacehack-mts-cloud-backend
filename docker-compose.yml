version: '3.8'

services:
  postgres:
    env_file:
      - .env.dev
    image: postgres:15
    container_name: mts_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mts_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mts_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mts_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mts_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-8080}

      # Database
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_DATABASE: ${POSTGRES_DB:-mts_db}

      # JWT
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-this}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}

      # TypeORM
      TYPEORM_SYNCHRONIZE: ${TYPEORM_SYNCHRONIZE:-false}
      TYPEORM_LOGGING: ${TYPEORM_LOGGING:-false}
    volumes:
      - ./src:/app/src
      - /app/node_modules
    networks:
      - mts_network
    command: node dist/main.js

volumes:
  postgres_data:
    name: mts_postgres_data

networks:
  mts_network:
    name: mts_network
    driver: bridge