version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: mts_postgres
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mts_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mts_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mts_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=${DB_PORT:-5432}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_DATABASE=${DB_DATABASE:-mts_db}
      - JWT_SECRET=${JWT_SECRET:-super_secure_jwt_secret_for_production_2026}
      - TYPEORM_SYNCHRONIZE=${TYPEORM_SYNCHRONIZE:-false}
      - TYPEORM_LOGGING=${TYPEORM_LOGGING:-false}
    networks:
      - mts_network

volumes:
  postgres_data:
    name: mts_postgres_data

networks:
  mts_network:
    name: mts_network
    driver: bridge