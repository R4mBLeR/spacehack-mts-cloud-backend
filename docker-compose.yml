services:
  postgres:
    image: postgres:15
    container_name: mts_postgres
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mts_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mts_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mts_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - PORT=8080
    networks:
      - mts_network

volumes:
  postgres_data:
    name: mts_postgres_data

networks:
  mts_network:
    name: mts_network
    driver: bridge